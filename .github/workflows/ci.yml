name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Node 20 (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Rust cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend deps
        run: npm ci

      - name: Frontend tests (vitest)
        run: npm test

      - name: Rust tests (workspace)
        run: cargo test --workspace

      # tauri-cli ships as the @tauri-apps/cli npm package. `npm ci` above
      # installed the OS-correct prebuilt binary into node_modules, so we call
      # it via npx — no separate cargo install / binstall step, no global tauri-cli.
      - name: Tauri build (smoke — produces app artifact)
        run: npx tauri build

      # Surface the Windows bundle as a downloadable workflow artifact so a
      # fresh Windows machine can install LogRadar by double-clicking the
      # setup.exe — zero dev toolchain (Rust/Node/tauri-cli) on the target.
      # The repo has a Cargo workspace at the root, so `cargo tauri build`
      # emits bundles under the *root* target/ — not src-tauri/target/. Both
      # locations are listed so the glob still works if that ever changes.
      - name: Upload Windows bundle (setup.exe + .msi)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: LogRadar-windows-setup
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
