name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Node 20 (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Rust cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install frontend deps
        run: npm ci

      - name: Frontend tests (vitest)
        run: npm test

      - name: Rust tests (workspace)
        run: cargo test --workspace

      # dtolnay/rust-toolchain@stable gives us `cargo` but not the `cargo-tauri`
      # subcommand. `cargo install tauri-cli` compiles the whole Tauri bundler
      # (~5 min); cargo-binstall fetches a prebuilt tauri-cli binary instead.
      # We compile the small `cargo-binstall` bootstrapper, then `binstall tauri-cli`.
      - name: Install tauri-cli (prebuilt via cargo-binstall)
        run: |
          cargo install cargo-binstall --locked --no-confirm
          cargo binstall tauri-cli --version "^2" --no-confirm

      - name: Tauri build (smoke — produces app artifact)
        run: cargo tauri build

      # Surface the Windows bundle as a downloadable workflow artifact so a
      # fresh Windows machine can install LogRadar by double-clicking the
      # setup.exe — zero dev toolchain (Rust/Node/tauri-cli) on the target.
      - name: Upload Windows bundle (setup.exe + .msi)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: LogRadar-windows-setup
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
